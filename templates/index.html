<!DOCTYPE html>
<html>
<head>
    <title>Retail Sales Analytics</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            width: 600px;
            text-align: center;
        }

        .btn-custom {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            font-weight: 500;
        }

        h1 {
            font-weight: bold;
        }

        .subtitle {
            color: gray;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="home-card shadow-lg">

    <h1>Retail Insights and Performance Dashboard</h1>
    <p class="subtitle">
        sales Performance analytics platform
    </p>

    <a href="/dashboard" class="btn btn-primary btn-custom">
        View Dashboard
    </a>

    <a href="/upload" class="btn btn-success btn-custom">
        Upload CSV Data
    </a>

    <a href="/add" class="btn btn-warning btn-custom">
        Add Sales Manually
    </a>

</div>

</body>
</html>
